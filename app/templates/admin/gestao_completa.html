{% extends "base.html" %}
{% block title %}Gestão Completa{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h2 class="text-2xl font-bold text-slate-800 mb-6">Central de Gestão</h2>

    <div class="grid grid-cols-2 gap-4">
        <!-- Serviços -->
        <a href="/servicos"
            class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md hover:border-blue-200 transition flex flex-col items-center text-center gap-3">
            <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-xl">
                <i class="fas fa-cut"></i>
            </div>
            <span class="font-bold text-slate-700">Serviços</span>
        </a>

        <!-- Produtos -->
        <a href="/produtos"
            class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md hover:border-green-200 transition flex flex-col items-center text-center gap-3">
            <div class="w-12 h-12 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-xl">
                <i class="fas fa-box"></i>
            </div>
            <span class="font-bold text-slate-700">Produtos</span>
        </a>

        <!-- Barbeiros -->
        <a href="/cadastrar-barbeiro"
            class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md hover:border-purple-200 transition flex flex-col items-center text-center gap-3">
            <div class="w-12 h-12 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center text-xl">
                <i class="fas fa-user-tie"></i>
            </div>
            <span class="font-bold text-slate-700">Barbeiros</span>
        </a>

        <!-- Configurações -->
        <a href="/admin/configuracoes"
            class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md hover:border-orange-200 transition flex flex-col items-center text-center gap-3">
            <div class="w-12 h-12 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center text-xl">
                <i class="fas fa-cog"></i>
            </div>
            <span class="font-bold text-slate-700">Ajustes</span>
        </a>
    </div>

    <div class="mt-8 text-center">
        <a href="/estatisticas" class="inline-flex items-center gap-2 text-blue-600 font-bold hover:underline">
            <i class="fas fa-chart-line"></i> Ver Relatórios Completos
        </a>
    </div>
</div>
{% endblock %}
