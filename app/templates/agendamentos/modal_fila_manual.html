<!-- modal_fila_manual.html -->
<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" id="modalFilaManual">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-hidden flex flex-col">

        <!-- Header -->
        <div
            class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-gradient-to-r from-blue-50 to-indigo-50">
            <div>
                <h3 class="text-lg font-bold text-slate-800">⚡ Oferecer Horário Vago</h3>
                <p class="text-sm text-slate-500">Horário: <span class="font-semibold">{{ horario_vago }}</span></p>
            </div>
            <button onclick="fecharModalFila()" class="text-slate-400 hover:text-slate-600 transition">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <!-- Body: Lista de Clientes -->
        <div class="p-4 overflow-y-auto flex-grow">
            {% if clientes %}
            <p class="text-sm text-slate-600 mb-3">Selecione os clientes para receber a oferta:</p>

            <form id="formEnviarFila">
                <input type="hidden" name="horario_vago" value="{{ horario_vago_iso }}">

                <div class="space-y-2">
                    {% for c in clientes %}
                    <label
                        class="flex items-center gap-3 p-3 bg-slate-50 hover:bg-blue-50 rounded-xl cursor-pointer transition border border-slate-200 hover:border-blue-300">
                        <input type="checkbox" name="cliente_id" value="{{ c.cliente_id }}"
                            class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
                        <div class="flex-grow">
                            <p class="font-semibold text-slate-800">{{ c.cliente_nome }}</p>
                            <p class="text-xs text-slate-500">
                                Agendado para {{ c.agendamento_hora }} • {{ c.barbeiro_nome }}
                            </p>
                        </div>
                        <i class="fab fa-whatsapp text-green-500 text-lg"></i>
                    </label>
                    {% endfor %}
                </div>

                <!-- Footer do Modal com Botão de Enviar -->
                <div class="mt-4 pt-4 border-t border-slate-200 flex justify-end gap-2">
                    <button type="button" onclick="fecharModalFila()"
                        class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg transition">
                        Cancelar
                    </button>
                    <button type="submit"
                        class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition flex items-center gap-2">
                        <i class="fas fa-paper-plane"></i> Enviar Oferta ({{ clientes|length }})
                    </button>
                </div>
            </form>
            {% else %}
            <div class="text-center py-8 text-slate-500">
                <i class="fas fa-user-slash text-4xl mb-3 text-slate-300"></i>
                <p>Nenhum cliente elegível encontrado para este horário.</p>
                <p class="text-xs mt-1">Tente um horário com mais agendamentos futuros.</p>
            </div>
            <div class="mt-4 flex justify-end">
                <button onclick="fecharModalFila()"
                    class="px-4 py-2 bg-slate-200 text-slate-700 rounded-lg hover:bg-slate-300 transition">
                    Fechar
                </button>
            </div>
            {% endif %}
        </div>
    </div>
</div>

<script>
    function fecharModalFila() {
        const modal = document.getElementById('modalFilaManual');
        if (modal) modal.remove();
    }

    // Submit do formulário via fetch
    document.getElementById('formEnviarFila')?.addEventListener('submit', async (e) => {
        e.preventDefault();

        const form = e.target;
        const formData = new FormData(form);
        const submitBtn = form.querySelector('button[type="submit"]');

        // Feedback visual
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';

        try {
            const response = await fetch('/fila/manual/enviar', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.sucesso) {
                alert(result.mensagem);
                fecharModalFila();
                // Opcional: recarregar a página para atualizar status
                // location.reload();
            } else {
                alert('❌ Erro: ' + (result.erro || 'Falha ao enviar'));
            }
        } catch (err) {
            alert('❌ Erro de conexão: ' + err.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Enviar Oferta';
        }
    });
</script>
