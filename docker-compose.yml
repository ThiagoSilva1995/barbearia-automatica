version: '3.8'

services:
  app:
    build: .
    container_name: barbearia_app
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - TZ=America/Sao_Paulo  # ✅ Variável MAIÚSCULA para fuso horário
      - BASE_URL=${BASE_URL:-http://localhost:8000}
    depends_on:
      - db
      - evolution_api
    volumes:
      - /etc/localtime:/etc/localtime:ro  # ✅ Sincroniza hora com o PC Windows/Linux
    networks:
      - barbearia_net

  db:
    image: postgres:15-alpine
    container_name: barbearia_db
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=senha123
      - POSTGRES_DB=barbearia_db
      - TZ=America/Sao_Paulo  # ✅ Banco também no horário de Brasília
    volumes:
      - pg_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro  # ✅ Sincroniza hora
    networks:
      - barbearia_net

  evolution_api:
    image: evoapicloud/evolution-api:v1.8.0
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://104.197.162.83:8080
      - DATABASE_PROVIDER=sqlite
      - AUTHENTICATION_API_KEY=iOS8d66fEr6Ou2M8nhJZRz6SKAmOGQkF
      - DISABLE_MANAGER=false
      - TZ=America/Sao_Paulo  # ✅ Evolution API também no horário de Brasília
    volumes:
      - evolution_data:/store
      - /etc/localtime:/etc/localtime:ro  # ✅ Sincroniza hora
    networks:
      - barbearia_net

volumes:
  pg_data:
  evolution_data:

networks:
  barbearia_net: